<div class="shell">
  <header class="shell__header">
    <a class="brand" routerLink="/search">🎬 Cinema</a>

    <nav class="nav">
      <a routerLink="/search" routerLinkActive="is-active">Поиск</a>
      <a routerLink="/favorites" routerLinkActive="is-active">Избранное</a>
    </nav>

    <button class="theme-btn" type="button" (click)="toggleTheme()">
      {{ isDark() ? '☀ Светлая' : '🌙 Тёмная' }}
    </button>
  </header>

  <app-error-banner />

  <main class="shell__main">
    <router-outlet />
  </main>

  <aside class="promo">
    <strong>Промо-блок</strong>
    <span>Место под партнёрские ссылки / донаты</span>
  </aside>

  <footer class="shell__footer">Portfolio project · Angular Movie Discovery</footer>
</div>
