<div class="shell">
  <header class="shell__header">
    <a class="brand" routerLink="/" [attr.aria-label]="i18n.t('app.brand')">
      <span class="brand__mark" aria-hidden="true">▶</span>
      <span class="brand__text">{{ i18n.t('app.brand') }}</span>
    </a>

    <nav class="nav" [attr.aria-label]="i18n.t('nav.primaryAria')">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        <span class="nav__icon" aria-hidden="true">🏠</span>
        <span class="nav__label">{{ i18n.t('nav.home') }}</span>
      </a>
      <a routerLink="/decide" routerLinkActive="is-active">
        <span class="nav__icon" aria-hidden="true">🎲</span>
        <span class="nav__label">{{ i18n.t('nav.tonight') }}</span>
      </a>
      <a routerLink="/diary" routerLinkActive="is-active">
        <span class="nav__icon" aria-hidden="true">📓</span>
        <span class="nav__label">{{ i18n.t('nav.diary') }}</span>
      </a>
      <a routerLink="/collections" routerLinkActive="is-active">
        <span class="nav__icon" aria-hidden="true">🗂️</span>
        <span class="nav__label">{{ i18n.t('nav.lists') }}</span>
      </a>
      <a routerLink="/inbox" routerLinkActive="is-active">
        <span class="nav__icon" aria-hidden="true">📥</span>
        <span class="nav__label">{{ i18n.t('nav.inbox') }}</span>
      </a>
      <a routerLink="/account" routerLinkActive="is-active">
        <span class="nav__icon" aria-hidden="true">👤</span>
        <span class="nav__label">{{ i18n.t('nav.account') }}</span>
      </a>
    </nav>

    <div class="header-end">
      <div class="header-support" role="group" [attr.aria-label]="i18n.t('promo.linksAria')">
        <span class="header-support__tag">{{ i18n.t('promo.headerLabel') }}</span>
        <span class="header-support__sep" aria-hidden="true">·</span>
        <a
          class="header-support__a"
          href="https://boosty.to/"
          target="_blank"
          rel="noreferrer noopener"
          >Boosty</a
        >
        <span class="header-support__sep" aria-hidden="true">·</span>
        <a
          class="header-support__a"
          href="https://www.patreon.com/DanilRiabokon"
          target="_blank"
          rel="noreferrer noopener"
          >Patreon</a
        >
        <span class="header-support__sep" aria-hidden="true">·</span>
        <a
          class="header-support__a header-support__a--accent"
          href="https://paypal.me/DanilRiabokon"
          target="_blank"
          rel="noreferrer noopener"
          >PayPal</a
        >
      </div>
      <div class="header-actions">
        <a
          class="server-pill"
          [class.server-pill--on]="serverConnected()"
          routerLink="/account"
          fragment="account-data"
          [attr.aria-label]="
            i18n.t('serverConnect.server') +
            ': ' +
            (serverConnected()
              ? i18n.t('serverConnect.connected')
              : i18n.t('serverConnect.disconnected'))
          "
          [attr.title]="
            serverConnected()
              ? i18n.t('serverConnect.server') + ': ' + i18n.t('serverConnect.connected')
              : i18n.t('serverConnect.server') + ': ' + i18n.t('serverConnect.disconnected')
          "
        >
          <span class="server-pill__dot" aria-hidden="true"></span>
          <span class="server-pill__label">{{ i18n.t('serverConnect.server') }}</span>
        </a>
        <button
          class="theme-btn"
          type="button"
          (click)="toggleTheme()"
          [attr.aria-pressed]="isDark()"
        >
          {{ isDark() ? i18n.t('theme.light') : i18n.t('theme.dark') }}
        </button>
        <select
          class="look-select"
          [value]="activeLookId()"
          (change)="onLookChange($event)"
          [attr.aria-label]="i18n.t('looks.selectAria')"
          [attr.title]="i18n.t('looks.selectHint')"
        >
          <option *ngFor="let l of looks(); trackBy: trackByLookId" [value]="l.id">
            {{ l.name }}
          </option>
        </select>
        <select
          class="lang-select"
          [value]="i18n.tmdbLocale()"
          (change)="onLocaleChange($event)"
          [attr.aria-label]="i18n.t('lang.selectAria')"
          [attr.title]="i18n.t('lang.tmdbDataHint')"
        >
          <option *ngFor="let o of localeOptions()" [value]="o.code">
            {{ o.flag }} {{ o.label }}
          </option>
        </select>
      </div>
    </div>
  </header>

  <app-error-banner />
  <app-toast-viewport />

  <main class="shell__main">
    <router-outlet />
  </main>
</div>
