<div class="shell">
  <header class="shell__header">
    <a class="brand" routerLink="/" aria-label="На главную">🏠 Home</a>

    <nav class="nav" aria-label="Основная навигация">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        <span class="nav__icon" aria-hidden="true">🏠</span>
        <span class="nav__label">{{ i18n.t('nav.home') }}</span>
      </a>
      <a routerLink="/favorites" routerLinkActive="is-active">
        <span class="nav__icon" aria-hidden="true">⭐</span>
        <span class="nav__label">{{ i18n.t('nav.favorites') }}</span>
      </a>
      <a routerLink="/notifications" routerLinkActive="is-active">
        <span class="nav__icon" aria-hidden="true">🔔</span>
        <span class="nav__label">{{ i18n.t('nav.notifications') }}</span>
      </a>
      <a routerLink="/account" routerLinkActive="is-active">
        <span class="nav__icon" aria-hidden="true">👤</span>
        <span class="nav__label">{{ i18n.t('nav.account') }}</span>
      </a>
    </nav>

    <div class="header-actions">
      <button class="theme-btn" type="button" (click)="toggleTheme()" [attr.aria-pressed]="isDark()">
        {{ isDark() ? i18n.t('theme.light') : i18n.t('theme.dark') }}
      </button>
      <button class="lang-btn" type="button" (click)="toggleLang()" [attr.aria-label]="'Language: ' + i18n.lang()">
        {{ i18n.lang() === 'ru' ? i18n.t('lang.ru') : i18n.t('lang.en') }}
      </button>
    </div>
  </header>

  <app-error-banner />

  <main class="shell__main">
    <router-outlet />
  </main>

  <aside class="promo" aria-labelledby="promo-title">
    <div class="promo__head">
      <strong id="promo-title">Поддержать проект</strong>
      <span class="promo__sub">Донат на развитие и новые фичи</span>
    </div>

    <div class="promo__actions" role="group" aria-label="Ссылки для доната">
      <a class="promo__btn" href="https://boosty.to/" target="_blank" rel="noreferrer noopener">Boosty</a>
      <a class="promo__btn" href="https://www.patreon.com/DanilRiabokon" target="_blank" rel="noreferrer noopener">Patreon</a>
      <a class="promo__btn promo__btn--primary" href="https://paypal.me/" target="_blank" rel="noreferrer noopener">
        PayPal
      </a>
    </div>
  </aside>

  <footer class="shell__footer"></footer>
</div>
